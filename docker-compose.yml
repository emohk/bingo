services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bingo_web
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: bingo_db
    environment:
      POSTGRES_DB: ${DB_NAME:-bingoprojectdb}
      POSTGRES_USER: ${DB_USER:-bingoprojectadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testpass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-bingoprojectadmin} -d ${DB_NAME:-bingoprojectdb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bingo_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
